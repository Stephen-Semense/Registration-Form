<!DOCTYPE html>
<html>
  <head>
    <title>Registration Form</title>
    <link rel="stylesheet" href="assets/css/style.css" />
  </head>
  <body>
    <section>
      <div class="container">
        <h2>Registration Form</h2>
        <form>
          <label for="firstname">First Name</label>
          <input type="text" id="firstname" name="firstname" required />

          <label for="middlename">Middle Name</label>
          <input type="text" id="middlename" name="middlename" required />

          <label for="familyname">Family Name</label>
          <input type="text" id="familyname" name="familyname" required />

          <label for="suffix">Suffix:</label>
          <select id="suffix" name="suffix">
            <option value="">--Select Suffix--</option>
            <option value="Jr.">Jr.</option>
            <option value="Sr.">Sr.</option>
            <option value="II">II</option>
            <option value="III">III</option>
            <option value="IV">IV</option>
          </select>

          <label for="mobileno">Mobile No.</label>
          <input
            type="tel"
            id="mobileno"
            name="mobileno"
            placeholder="#"
            pattern="^09[0-9]{9}$"
            maxlength="11"
            required
          />
          <small>e.g., 09123456789</small>

          <label for="section">Section</label>
          <input
            type="text"
            id="section"
            name="section"
            placeholder="1A"
            pattern="^[1-6][A-Z]$"
            required
          />

          <label for="technolgy">Technolgy</label>
          <select id="technolgy" name="technolgy">
            <option value=""></option>
            <option value="Mechanical Engineering">
              Mechanical Engineering
            </option>
            <option value="Computer Engineering">Computer Engineering</option>
            <option value="Electrical Engineering">
              Electrical Engineering
            </option>
            <option value="Electronics Engineering">
              Electronics Engineering
            </option>
          </select>

          <label for="batch">Batch</label>
          <input
            type="text"
            id="batch"
            name="batch"
            placeholder="33A"
            pattern="^[0-9]{1,2}[A-Z]$"
            required
          />
          <small>ex. 33A</small>

          <label for="schoolid">School ID (format: YYYY-BB-NNN):</label>
          <input
            type="text"
            id="schoolid"
            name="schoolid"
            placeholder="2023-33-129"
            pattern="^[0-9]{4}-[0-9]{2}-[0-9]{3}$"
            required
          />
          <small>Year - Batch - ID Number.</small>

          <button id="register">Register</button>
        </form>
      </div>
    </section>

    <div id="popup" class="popup">
      <div class="popup-content">
        <span id="closePopup" class="close-btn">&times;</span>
        <h3>✅ Success!</h3>
        <p>Your account has been successfully registered.</p>
      </div>
    </div>

    <script src="assets/js/script.js"></script>
  </body>
</html>
